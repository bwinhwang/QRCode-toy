<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>超市扫码器</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 扫描区域 -->
    <div id="scanner-container">
      <div id="reader"></div>
      <!-- 取景框角标 -->
      <div class="viewfinder">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
      </div>
      <div id="scan-line" style="display:none"></div>
      <div id="start-btn">点击开始扫描</div>
    </div>

    <!-- 收银机显示屏 -->
    <div id="pos-display">
      <!-- 最近扫描的商品（小票风格） -->
      <div id="receipt">
        <div id="receipt-list"></div>
      </div>
      <!-- 价格与统计 -->
      <div id="price-panel">
        <div id="current-price">
          <div class="label">单价</div>
          <div class="led-row">
            <span class="currency">¥</span>
            <span id="price-value">0.00</span>
          </div>
        </div>
        <div id="divider"></div>
        <div id="total-info">
          <div class="total-row">
            <span class="label">数量</span>
            <span id="item-count" class="led-small">0</span>
          </div>
          <div class="total-row">
            <span class="label">合计</span>
            <span class="led-row-small">
              <span class="currency-small">¥</span>
              <span id="total-value" class="led-small">0.00</span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="html5-qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
